apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app
  labels:
    app: hackathon-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hackathon-app

  template:
    metadata:
      labels:
        app: hackathon-app

    spec:
      containers:
        - name: hackathon-app
          image: REPLACE_WITH_ECR_URI:latest
          ports:
            - containerPort: 8080

          # ✅ Health checks (PRODUCTION READY)
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          # ✅ Resource limits
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
