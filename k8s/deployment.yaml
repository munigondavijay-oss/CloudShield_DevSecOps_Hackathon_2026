apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app
  labels:
    app: hackathon-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hackathon-app

  template:
    metadata:
      labels:
        app: hackathon-app

    spec:
      containers:
        - name: hackathon-app
          image: REPLACE_WITH_ECR_URI:latest
          ports:
            - containerPort: 8080

      
