name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code (from main branch)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      # ✅ Debug: ensure cluster is reachable
      - name: Verify Cluster Connection
        run: |
          kubectl get nodes
          kubectl get deployments

      - name: Set Image URI
        run: |
          echo "IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}" >> $GITHUB_ENV

      # ✅ Ensure deployment exists (first-time safe)
      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # ✅ Deploy latest image
      - name: Deploy Latest Image to EKS
        run: |
          kubectl set image deployment/hackathon-app \
            hackathon-app=$IMAGE_URI:latest

      # ✅ Wait for rollout
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/hackathon-app

      # ✅ Rollback on failure
      - name: Rollback if Failed
        if: failure()
        run: |
          kubectl rollout undo deployment/hackathon-app
